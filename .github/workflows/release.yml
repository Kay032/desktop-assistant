name: 'publish'

on:
  push:
    tags:
      - 'v*'  # Trigger on tags like v1.0.0, v0.1.0, etc.
  workflow_dispatch:  # Allows manual triggering from GitHub UI

jobs:
  publish-tauri:
    permissions:
      contents: write  # Needed to create releases
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'   # For Intel-based Macs
            args: '--target x86_64-apple-darwin'
          - platform: 'macos-latest'   # For Apple Silicon Macs (M1/M2/M3)
            args: '--target aarch64-apple-darwin'
          - platform: 'ubuntu-22.04'    # For Linux
            args: ''
          - platform: 'windows-latest'  # For Windows
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'  # Change to 'yarn' or 'pnpm' if you use those

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Build the frontend
        run: npm run build

      - name: Build and release with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__  # Automatically replaced with app version
          releaseName: 'Desktop Assistant v__VERSION__'
          releaseBody: 'See the assets below to download and install this version.'
          releaseDraft: true      # Creates as draft - you can review before publishing
          prerelease: false
          args: ${{ matrix.args }}
